<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0b0d14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>IronLog</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0d14;--surf:#13161f;--surf2:#1c2030;--surf3:#252a3a;
  --bdr:#252a3a;--bdr2:#2f3548;
  --acc:#c8f03c;--acc-dim:rgba(200,240,60,.12);
  --dan:#f03c5f;--wrn:#f0a832;
  --push:#f06832;--pull:#3c6ef0;--legs:#9c3cf0;
  --upper:#3cc8f0;--lower:#f0c832;--custom:#3cf09c;
  --t1:#edf0f8;--t2:#8892a8;--t3:#50596e;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#R{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:'DM Sans',sans-serif;color:var(--t1)}
select option{background:var(--surf2)}
#R{display:flex;flex-direction:column;max-width:520px;margin:0 auto}
.app{display:flex;flex-direction:column;height:100vh}
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--sb))}
::-webkit-scrollbar{width:0}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* nav */
.nav{display:flex;background:var(--surf);border-top:1px solid var(--bdr);padding-bottom:var(--sb);flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border:none;background:none;transition:color .15s}
.ni.on{color:var(--acc)}

/* cards/buttons */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97);opacity:.82}
.ba{background:var(--acc);color:#0b0d14}
.bs{background:var(--surf2);color:var(--t1);border:1px solid var(--bdr2)}
.bd{background:rgba(240,60,95,.12);color:var(--dan);border:1px solid rgba(240,60,95,.2)}
.bg{background:transparent;color:var(--t2);padding:6px}

/* pill */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.04em}

/* num input */
.ni2{background:var(--surf2);border:1.5px solid var(--bdr2);border-radius:8px;padding:8px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;width:70px;outline:none;color:var(--t1);transition:border-color .15s}
.ni2:focus{border-color:var(--acc)}
.ni2.ds{border-color:var(--wrn);color:var(--wrn)}
.si{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--t1);font-size:15px;outline:none}
.si:focus{border-color:var(--acc)}
.si::placeholder{color:var(--t3)}

/* toggle */
.tog{display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.tt{width:36px;height:20px;background:var(--surf3);border-radius:10px;position:relative;transition:background .2s;border:1.5px solid var(--bdr2);flex-shrink:0}
.tt.on{background:var(--acc);border-color:var(--acc)}
.th{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#0b0d14;transition:transform .2s}
.tt.on .th{transform:translateX(16px)}

/* set row */
.sr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.sr:last-child{border-bottom:none}
.sn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--t3);width:18px;text-align:center;flex-shrink:0}
.il{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;text-align:center;margin-top:2px}

/* section label */
.sl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}

/* overlays */
.ov{position:fixed;inset:0;background:rgba(11,13,20,.88);z-index:100;backdrop-filter:blur(3px)}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;max-height:88vh;background:var(--surf);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr2);z-index:101;display:flex;flex-direction:column}
.sh{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sc{flex:1;overflow-y:auto;padding:10px 16px calc(24px + var(--sb))}

/* workout overlay */
.wo{position:fixed;inset:0;max-width:520px;margin:0 auto;background:var(--bg);z-index:50;display:flex;flex-direction:column;overflow:hidden}
.wh{padding:12px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
.wb{flex:1;overflow-y:auto;padding:12px 16px 120px}
.wf{position:absolute;bottom:0;left:0;right:0;padding:12px 16px calc(12px + var(--sb));background:linear-gradient(transparent,var(--bg) 30%)}
.tmr{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--acc);letter-spacing:.06em}

/* level card */
.lc{border:2px solid var(--bdr2);border-radius:12px;padding:12px 14px;margin-bottom:7px}
.lc.cur{border-color:var(--acc);background:var(--acc-dim)}
.lc.done{opacity:.45}

/* backup banner */
.bb{background:rgba(240,168,50,.1);border:1px solid rgba(240,168,50,.25);border-radius:8px;padding:10px 14px;margin:0 16px 10px;display:flex;align-items:center;gap:10px}

/* pr badge */
.pr{background:var(--acc);color:#0b0d14;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;padding:1px 5px;border-radius:4px;letter-spacing:.06em}

/* anims */
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.su{animation:su .25s cubic-bezier(.34,1.2,.64,1)}
.fi{animation:fi .18s ease}
</style>
</head>
<body>
<div id="R"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const SC={Push:'#f06832',Pull:'#3c6ef0',Legs:'#9c3cf0',Upper:'#3cc8f0',Lower:'#f0c832',Custom:'#3cf09c'};
const EL={
  Chest:['Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Fly','Cable Fly','Pec Deck','Push-ups','Weighted Push-ups','Weighted Dips'],
  Shoulders:['Overhead Press (Barbell)','Overhead Press (Dumbbell)','Arnold Press','Lateral Raise','Front Raise','Face Pull','Upright Row','Cable Lateral Raise'],
  Triceps:['Tricep Pushdown','Skull Crushers','Overhead Tricep Extension','Close Grip Bench Press','Diamond Push-ups','Dips'],
  Back:['Deadlift','Rack Pull','Barbell Row','T-Bar Row','Seated Cable Row','Dumbbell Row','Chest-Supported Row'],
  Lats:['Lat Pulldown','Pull-up','Chin-up','Neutral Grip Pull-up','Straight Arm Pulldown','Single Arm Cable Row'],
  Biceps:['Barbell Curl','Dumbbell Curl','Hammer Curl','Preacher Curl','Cable Curl','Incline Dumbbell Curl','Concentration Curl'],
  Legs:['Squat','Front Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Bulgarian Split Squat','Lunges','Hip Thrust','Hack Squat','Goblet Squat'],
  Calves:['Standing Calf Raise','Seated Calf Raise','Single Leg Calf Raise'],
  Core:['Plank','Ab Wheel','Cable Crunch','Hanging Leg Raises','Leg Raises','Russian Twists','Hollow Body Hold'],
  Cardio:['Running','Cycling','Jump Rope','Rowing Machine','Stair Climber']
};
const SM={Push:['Chest','Shoulders','Triceps'],Pull:['Back','Lats','Biceps'],Legs:['Legs','Calves','Core'],Upper:['Chest','Shoulders','Triceps','Back','Lats','Biceps'],Lower:['Legs','Calves','Core'],Custom:Object.keys(EL)};
const PL=[
  {l:1,n:'Dead Hang Hold',t:'3 × 20–30s holds',tip:'Scapula down, core engaged. Build grip.'},
  {l:2,n:'Negatives',t:'3 × 5 slow negatives',tip:'Jump to top, lower in 5–8 seconds. Highly effective.'},
  {l:3,n:'Band Assisted (Heavy)',t:'3 × 6 reps',tip:'Thick band. Place on ball of foot, not knee.'},
  {l:4,n:'Band Assisted (Light)',t:'3 × 8 reps',tip:'Thinner band. If you can do 10+, move up.'},
  {l:5,n:'Bodyweight — First Reps',t:'3 × 3–5 reps',tip:'Dead hang start. Full range — chin over bar.'},
  {l:6,n:'Bodyweight — Volume',t:'3 × 8–10 reps',tip:'2–3 min rest between sets. Quality over speed.'},
  {l:7,n:'Weighted +5kg',t:'3 × 5 reps',tip:'Belt or vest. Form before weight.'},
  {l:8,n:'Weighted +15kg',t:'3 × 5 reps',tip:'Log every session. Small jumps compound fast.'},
  {l:9,n:'Weighted +25kg',t:'3 × 5 reps',tip:'Deload every 4th week. Seriously.'},
  {l:10,n:'Archer Pull-ups',t:'3 × 5 each side',tip:'One arm extended, pull with the other. Towel assist.'},
  {l:11,n:'One Arm Pull-up',t:'1 clean rep each arm',tip:'2–4 years of consistent work. You\'ve earned it.'}
];

// ── UTILS ─────────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,11);
const today=()=>new Date().toISOString().slice(0,10);
const fd=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})};
const ft=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`};
const sc=s=>SC[s]||SC.Custom;
const cv=ex=>ex.sets.reduce((t,s)=>t+(s.reps||0)*(s.weight||0),0);
const wvol=w=>w.exercises.reduce((t,e)=>t+cv(e),0);
function streak(ws){
  const ds=[...new Set(ws.map(w=>w.date))].sort().reverse();
  if(!ds.length)return 0;
  let n=0,c=today();
  const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().slice(0,10);
  if(ds[0]!==c){if(ds[0]!==ys)return 0;c=ys}
  for(const d of ds){if(d===c){n++;const dt=new Date(c+'T00:00:00');dt.setDate(dt.getDate()-1);c=dt.toISOString().slice(0,10)}else if(d<c)break}
  return n;
}
const getPRs=ws=>{const p={};ws.forEach(w=>w.exercises.forEach(e=>{const mx=Math.max(0,...e.sets.map(s=>s.weight||0));if(!p[e.name]||mx>p[e.name].w)p[e.name]={w:mx,date:w.date}}));return p};

// ── INDEXEDDB ─────────────────────────────────────────────────────────────────
let DB=null;
function initDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('ironlog_v3',1);
  r.onupgradeneeded=e=>{const d=e.target.result;['workouts','bodyweight','pullupSessions','snapshots','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'})})};
  r.onsuccess=e=>{DB=e.target.result;res()};
  r.onerror=()=>rej(r.error);
})}
const dbAll=s=>new Promise((res,rej)=>{const t=DB.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const dbPut=(s,item)=>new Promise((res,rej)=>{const t=DB.transaction(s,'readwrite');const r=t.objectStore(s).put(item);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
const dbDel=(s,id)=>new Promise((res,rej)=>{const t=DB.transaction(s,'readwrite');const r=t.objectStore(s).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
const dbGet=(s,id)=>new Promise((res,rej)=>{const t=DB.transaction(s,'readonly');const r=t.objectStore(s).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});

// ── STATE ─────────────────────────────────────────────────────────────────────
let S={
  view:'today',sub:null,
  workouts:[],bodyweight:[],pullupSessions:[],snapshots:[],
  settings:{pullupLevel:4,lastExport:null,notifTime:'08:00',notifEnabled:false},
  workout:null,  // active workout
  calMonth:new Date(),calDay:null,
  statsEx:'',
  loaded:false
};

// ── ICONS ─────────────────────────────────────────────────────────────────────
const IP={
  dumbbell:'M6.5 6.5h11M6.5 17.5h11M5 4.5h3v15H5zM16 4.5h3v15h-3z',
  calendar:'M3 9h18M8 3v3m8-3v3M3 6a1 1 0 011-1h16a1 1 0 011 1v14a1 1 0 01-1 1H4a1 1 0 01-1-1V6z',
  clock:'M12 7v5l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z',
  chart:'M3 3v18h18M7 16l4-4 4 4 4-8',
  grid:'M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z',
  plus:'M12 5v14M5 12h14',
  check:'M20 6L9 17l-5-5',
  x:'M18 6L6 18M6 6l12 12',
  cR:'M9 18l6-6-6-6',cL:'M15 18l-6-6 6-6',cD:'M6 9l6 6 6-6',cU:'M18 15l-6-6-6 6',
  trash:'M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6',
  dl:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3',
  ul:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12',
  bell:'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0',
  cog:'M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06-.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z',
  back:'M19 12H5M12 19l-7-7 7-7',
  zap:'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
  shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  activity:'M22 12h-4l-3 9L9 3l-3 9H2',
  play:'M5 3l14 9-14 9V3z',
  flame:'M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z',
};
const I=(n,sz=20,col='currentColor')=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="${IP[n]||''}"/></svg>`;

// ── CHARTS ────────────────────────────────────────────────────────────────────
function lineChart(vals,col,h=80){
  if(!vals||vals.length<2)return`<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px">Not enough data yet</div>`;
  const W=300,P=10,mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>[P+(i/(vals.length-1))*(W-P*2),h-P-((v-mn)/rng)*(h-P*2)]);
  const d=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const gid='g'+Math.random().toString(36).slice(2,6);
  return`<svg viewBox="0 0 ${W} ${h}" style="width:100%;height:${h}px">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${d} L${pts[pts.length-1][0]},${h} L${pts[0][0]},${h} Z" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4" fill="${col}"/>
  </svg>`;
}
function barChart(vals,col,h=65){
  if(!vals?.some(v=>v>0))return`<div style="height:${h}px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px">No data yet</div>`;
  const W=300,P=4,mx=Math.max(...vals)||1,bw=(W-P*2)/vals.length-3;
  return`<svg viewBox="0 0 ${W} ${h}" style="width:100%;height:${h}px">${vals.map((v,i)=>{const bh=Math.max(2,(v/mx)*(h-P*2));return`<rect x="${P+i*(bw+3)}" y="${h-P-bh}" width="${bw}" height="${bh}" fill="${col}" rx="2" opacity="${v>0?0.85:0.2}"/>`}).join('')}</svg>`;
}
function heatmap(ws){
  const td=new Date(),cells=[];
  for(let i=363;i>=0;i--){const d=new Date(td);d.setDate(d.getDate()-i);cells.push(d.toISOString().slice(0,10))}
  const byd={};ws.forEach(w=>{if(!byd[w.date])byd[w.date]=[];byd[w.date].push(w)});
  const fdow=new Date(cells[0]).getDay(),pad=fdow===0?6:fdow-1;
  const padded=[...Array(pad).fill(null),...cells];
  const weeks=[];for(let i=0;i<padded.length;i+=7)weeks.push(padded.slice(i,i+7));
  return`<div style="overflow-x:auto"><div style="display:flex;gap:2px;min-width:fit-content">${weeks.map(wk=>`<div style="display:flex;flex-direction:column;gap:2px">${wk.map((date,di)=>{if(!date)return`<div style="width:11px;height:11px"/>`;const ws2=byd[date]||[];return`<div style="width:11px;height:11px;border-radius:2px;background:${ws2.length?sc(ws2[0].split):'var(--surf3)'}" title="${date}"/>`;}).join('')}</div>`).join('')}</div></div>`;
}

// ── PILL / TOGGLE HTML ────────────────────────────────────────────────────────
const pill=(s,sm)=>`<span class="pill" style="background:${sc(s)}22;color:${sc(s)};font-size:${sm?11:13}px">${s}</span>`;
const tog=(id,on,lbl)=>`<label class="tog" onclick="tTog('${id}')"><div class="tt${on?' on':''}" id="tt_${id}"><div class="th"></div></div>${lbl?`<span style="font-size:12px;color:var(--t2)">${lbl}</span>`:''}</label>`;

// ── SECTION LABEL ─────────────────────────────────────────────────────────────
const SL=(t,r='')=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px"><span class="sl">${t}</span>${r}</div>`;

// ── SET ROW (FIX: oninput not onchange) ───────────────────────────────────────
function setRow(eI,sI,s,tot){
  return`<div class="sr" id="sr_${eI}_${sI}">
    <span class="sn">${sI+1}</span>
    ${s.isDropset?`<span style="font-size:9px;color:var(--wrn);writing-mode:vertical-rl;transform:rotate(180deg);font-weight:700;letter-spacing:.06em">DROP</span>`:''}
    <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
      <input type="number" inputmode="decimal" class="ni2${s.isDropset?' ds':''}"
        value="${s.weight!==undefined&&s.weight!==''?s.weight:''}" placeholder="0"
        oninput="upSet(${eI},${sI},'weight',this.value)"/>
      <div class="il">kg</div>
    </div>
    <span style="color:var(--t3);font-size:17px">×</span>
    <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
      <input type="number" inputmode="numeric" class="ni2${s.isDropset?' ds':''}"
        value="${s.reps!==undefined&&s.reps!==''?s.reps:''}" placeholder="0" style="width:62px"
        oninput="upSet(${eI},${sI},'reps',this.value)"/>
      <div class="il">reps</div>
    </div>
    <div style="margin-left:auto;display:flex;flex-direction:column;gap:5px;align-items:flex-end">
      ${tog(`d_${eI}_${sI}`,s.isDropset,'Drop')}

// Workout action handlers
function upSet(eI,sI,f,v){
  const w=S.workout;if(!w)return;
  const sets=[...w.exercises[eI].sets];
  sets[sI]={...sets[sI],[f]:f==='reps'?parseInt(v)||0:parseFloat(v)||0};
  w.exercises[eI]={...w.exercises[eI],sets};
  S.workout=w;
  upWStats();
}
function tTog(id){
  if(id.startsWith('d_')){
    const [,eI,sI]=id.split('_').map(Number);
    const w=S.workout;if(!w)return;
    const sets=[...w.exercises[eI].sets];
    sets[sI]={...sets[sI],isDropset:!sets[sI].isDropset};
    w.exercises[eI]={...w.exercises[eI],sets};
    S.workout=w;
    const row=document.getElementById(`sr_${eI}_${sI}`);
    if(row)row.outerHTML=setRow(eI,sI,sets[sI],sets.length);
    upWStats();
  } else if(id==='notif'){
    tNotif();
  }
}
function addSet(eI){
  const w=S.workout;if(!w)return;
  const ex=w.exercises[eI];
  const last=ex.sets[ex.sets.length-1];
  const ns={id:uid(),weight:last?.weight||0,reps:last?.reps||8,isDropset:false};
  w.exercises[eI]={...ex,sets:[...ex.sets,ns]};
  S.workout=w;
  rebuildSets(eI);
}
function delSet(eI,sI){
  const w=S.workout;if(!w)return;
  const sets=w.exercises[eI].sets.filter((_,i)=>i!==sI);
  if(!sets.length){delEx(eI);return}
  w.exercises[eI]={...w.exercises[eI],sets};
  S.workout=w;
  rebuildSets(eI);
}
function mFill(eI,sI){
  const w=S.workout;if(!w)return;
  const src=w.exercises[eI].sets[sI];
  const sets=w.exercises[eI].sets.map((s,i)=>i>sI?{...s,weight:src.weight,reps:src.reps}:s);
  w.exercises[eI]={...w.exercises[eI],sets};
  S.workout=w;
  rebuildSets(eI);
}
function togCol(eI){
  const w=S.workout;if(!w)return;
  w.exercises[eI]={...w.exercises[eI],_col:!w.exercises[eI]._col};
  S.workout=w;
  rebuildCard(eI);
}
function delEx(eI){
  const w=S.workout;if(!w)return;
  w.exercises=w.exercises.filter((_,i)=>i!==eI);
  S.workout=w;
  rebuildWB();
}

// ── SNAPSHOT / BACKUP ─────────────────────────────────────────────────────────
async function snap(){
  const s={id:uid(),date:today(),ts:Date.now(),workouts:S.workouts,bodyweight:S.bodyweight,pullupSessions:S.pullupSessions};
  await dbPut('snapshots',s);
  S.snapshots=[s,...S.snapshots].slice(0,3);
  const all=await dbAll('snapshots');
  const sorted=all.sort((a,b)=>b.ts-a.ts);
  for(let i=3;i<sorted.length;i++)await dbDel('snapshots',sorted[i].id);
}
function exportJSON(){
  const blob=new Blob([JSON.stringify({exportDate:new Date().toISOString(),version:3,workouts:S.workouts,bodyweight:S.bodyweight,pullupSessions:S.pullupSessions,settings:S.settings},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`ironlog-${today()}.json`;a.click();URL.revokeObjectURL(url);
  S.settings={...S.settings,lastExport:today()};
  dbPut('settings',{id:'main',...S.settings});
  render();
}
function importJSON(file){
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.workouts)throw 0;
      for(const w of d.workouts)await dbPut('workouts',w);
      for(const b of d.bodyweight||[])await dbPut('bodyweight',b);
      for(const p of d.pullupSessions||[])await dbPut('pullupSessions',p);
      S.workouts=await dbAll('workouts');S.bodyweight=await dbAll('bodyweight');S.pullupSessions=await dbAll('pullupSessions');
      alert('✅ Restored successfully!');render();
    }catch{alert('❌ Invalid file — must be an IronLog backup')}
  };
  r.readAsText(file);
}

async function tNotif(){
  if(!S.settings.notifEnabled){

    if(p!=='granted'){alert('Permission denied. Enable in browser settings.');return}
  }
  S.settings={...S.settings,notifEnabled:!S.settings.notifEnabled};
  await dbPut('settings',{id:'main',...S.settings});
  if(S.settings.notifEnabled&&navigator.serviceWorker?.controller)
    navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIF',time:S.settings.notifTime});
  render();
}

  return`
  <div style="padding:16px 16px 10px;display:flex;align-items:center;gap:10px">
    <button class="bg" onclick="S.sub=null;S.view='more';render()">${I('back',22)}</button>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px">Settings</div>
  </div>
  ${SL('BODYWEIGHT REMINDER')}
  <div style="padding:0 16px 12px"><div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div><div style="font-weight:600">Daily Notification</div><div style="font-size:12px;color:var(--t3);margin-top:1px">Reminds you to log your weight each day</div></div>
      ${tog('notif',s.notifEnabled)}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:14px">Time</span>
      <input type="time" value="${s.notifTime||'08:00'}" onchange="updNT(this.value)" style="background:var(--surf2);border:1.5px solid var(--bdr2);border-radius:8px;padding:6px 10px;color:var(--t1);font-size:14px;outline:none"/>
    </div>
    ${!s.notifEnabled?`<div style="margin-top:10px;font-size:12px;color:var(--t3);background:var(--surf2);padding:8px;border-radius:8px">Enable to be prompted for notification permission.</div>`:''}
  </div></div>
  ${SL('ABOUT')}
  <div style="padding:0 16px 16px"><div class="card" style="font-size:13px;color:var(--t2);line-height:1.6">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--acc);margin-bottom:4px">IronLog v2</div>
    <div>All data stored on device via IndexedDB. No cloud, no account.</div>
    <div style="margin-top:6px">To install as APK: host this folder → <strong>pwabuilder.com</strong></div>
  </div></div>`;
}
async function updNT(v){S.settings={...S.settings,notifTime:v};await dbPut('settings',{id:'main',...S.settings});if(S.settings.notifEnabled&&navigator.serviceWorker?.controller)navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIF',time:v})}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
function navHTML(){
  const v=S.view,sub=S.sub;
  const tabs=[['today','dumbbell','Today'],['calendar','calendar','Cal'],['history','clock','History'],['stats','chart','Stats'],['more','grid','More']];
  return`<nav class="nav">${tabs.map(([id,ic,lbl])=>`<button class="ni${v===id&&!sub?' on':''}" onclick="setV('${id}')">${I(ic,22,v===id&&!sub?'var(--acc)':'var(--t3)')}<span>${lbl}</span></button>`).join('')}</nav>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('R');
  if(!S.loaded){root.innerHTML=`<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:48px;color:var(--acc);letter-spacing:-.02em">IRON<span style="color:var(--t2)">LOG</span></div><div style="color:var(--t3);font-size:13px">Loading...</div></div>`;return}
  if(S.workout){root.innerHTML=workoutHTML();return}
  let body='';
  if(S.sub==='pullups')body=puHTML();
  else if(S.sub==='bodyweight')body=bwHTML();
  else if(S.sub==='settings')body=settHTML();
  else if(S.view==='today')body=todayHTML();
  else if(S.view==='calendar')body=calHTML();
  else if(S.view==='history')body=histHTML();
  else if(S.view==='stats')body=statsHTML();
  else if(S.view==='more')body=moreHTML();
  root.innerHTML=`<div class="app"><div class="scr fi">${body}</div>${navHTML()}</div>`;
}
function setV(v){S.view=v;S.sub=null;render()}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  render();
  try{
    await initDB();
    S.workouts=await dbAll('workouts');
    S.bodyweight=await dbAll('bodyweight');
    S.pullupSessions=await dbAll('pullupSessions');
    S.snapshots=(await dbAll('snapshots')).sort((a,b)=>b.ts-a.ts);
    const cfg=await dbGet('settings','main');
    if(cfg){S.settings={...S.settings,...cfg}}
    if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  }catch(e){console.error('DB init error',e)}
  S.loaded=true;
  render();
}
init();
</script>
</body>
</html>
